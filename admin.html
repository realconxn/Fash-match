```html
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สำหรับคุณครู/ผู้ปกครอง</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- เพิ่ม Library สำหรับสร้าง PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <style>
        body { background-image: url('IMG_0054.png'); background-size: cover; background-position: center; background-attachment: fixed; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <!-- Modal เปลี่ยนรหัสผ่าน -->
    <div id="passwordModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
        <div class="bg-white p-6 rounded-2xl w-full max-w-xs shadow-2xl">
            <h2 class="text-lg font-bold mb-4 text-teal-800">เปลี่ยนรหัสผ่านใหม่</h2>
            <div class="relative w-full mb-4">
                <input type="password" id="newPassInput" placeholder="รหัสผ่านใหม่" class="w-full p-3 border rounded-xl outline-teal-500 pr-12">
                <button type="button" onclick="togglePass('newPassInput')" class="absolute right-3 top-3 text-gray-400 hover:text-gray-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                </button>
            </div>
            <div class="flex gap-2">
                <button onclick="saveNewPassword()" class="flex-1 bg-teal-500 text-white py-2 rounded-xl font-bold">บันทึก</button>
                <button onclick="closeModal()" class="flex-1 bg-gray-200 py-2 rounded-xl font-bold">ยกเลิก</button>
            </div>
        </div>
    </div>

    <div class="max-w-5xl mx-auto bg-white/70 backdrop-blur-xl p-6 rounded-3xl shadow-2xl border border-white/70">
        <header class="flex justify-between items-center mb-8 border-b border-teal-200 pb-4">
            <h1 class="text-2xl font-bold text-teal-800">สำหรับคุณครู/ผู้ปกครอง</h1>
            <a href="index.html" class="bg-teal-500 text-white px-4 py-2 rounded-lg hover:bg-teal-600 transition shadow-md">ย้อนกลับ</a>
        </header>

        <div class="flex flex-wrap gap-2 mb-6">
            <button onclick="openModal()" class="bg-pink-500 text-white px-4 py-2 rounded-lg hover:bg-pink-600 transition shadow-md">เปลี่ยนรหัสผ่าน</button>
            <button onclick="copyTable()" class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600 transition shadow-md">คัดลอกข้อมูล</button>
            <button onclick="exportExcel()" class="bg-green-500 text-white px-4 py-2 rounded-lg hover:bg-green-600 transition shadow-md">บันทึกเป็น Excel</button>
            <button onclick="exportPDF()" class="bg-purple-500 text-white px-4 py-2 rounded-lg hover:bg-purple-600 transition shadow-md">บันทึกเป็น PDF</button>
            <button onclick="clearData()" class="bg-rose-500 text-white px-4 py-2 rounded-lg hover:bg-rose-600 transition shadow-md">ลบข้อมูลทั้งหมด</button>
        </div>

        <div class="overflow-x-auto bg-white/50 rounded-xl p-2">
            <table class="w-full text-left border-collapse" id="scoreTable">
                <thead>
                    <tr class="bg-teal-600 text-white">
                        <th class="p-3 border border-teal-500">ชื่อ-นามสกุล</th>
                        <th class="p-3 border border-teal-500">ชั้น</th>
                        <th class="p-3 border border-teal-500">เลขที่</th>
                        <th class="p-3 border border-teal-500">คะแนน</th>
                        <th class="p-3 border border-teal-500">เวลา (วิ)</th>
                        <th class="p-3 border border-teal-500">วันที่</th>
                    </tr>
                </thead>
                <tbody id="scoreBody" class="text-teal-900 font-medium"></tbody>
            </table>
        </div>
    </div>

    <script>
        function togglePass(id) { const input = document.getElementById(id); input.type = input.type === 'password' ? 'text' : 'password'; }
        function openModal() { document.getElementById('passwordModal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('passwordModal').classList.add('hidden'); }
        
        function saveNewPassword() {
            const newPass = document.getElementById('newPassInput').value;
            if (newPass && newPass.length >= 4) {
                localStorage.setItem('adminPassword', newPass);
                alert("เปลี่ยนรหัสผ่านสำเร็จ!");
                closeModal();
            } else { alert("รหัสผ่านต้องมีอย่างน้อย 4 ตัวอักษร"); }
        }

        function loadData() {
            const data = JSON.parse(localStorage.getItem('studentHistory') || '[]');
            const tbody = document.getElementById('scoreBody');
            tbody.innerHTML = data.map(item => `
                <tr class="border-b border-teal-200 hover:bg-white/50 transition">
                    <td class="p-3 border border-teal-200">${item.name}</td>
                    <td class="p-3 border border-teal-200">${item.class}</td>
                    <td class="p-3 border border-teal-200">${item.number}</td>
                    <td class="p-3 border border-teal-200">${item.score}/10</td>
                    <td class="p-3 border border-teal-200">${item.time}</td>
                    <td class="p-3 border border-teal-200">${item.date}</td>
                </tr>
            `).join('');
        }

        // ฟังก์ชันส่งออกเป็น PDF
        function exportPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            doc.text("รายงานผลคะแนนนักเรียน", 14, 15);
            doc.autoTable({
                html: '#scoreTable',
                startY: 20,
                theme: 'grid',
                styles: { font: "helvetica", fontSize: 10 }
            });
            doc.save('ScoreData.pdf');
        }

        function copyTable() {
            const table = document.getElementById('scoreTable');
            let range = document.createRange();
            range.selectNode(table);
            window.getSelection().removeAllRanges();
            window.getSelection().addRange(range);
            document.execCommand('copy');
            alert("คัดลอกข้อมูลลงคลิปบอร์ดแล้ว");
        }

        function exportExcel() {
            const table = document.getElementById('scoreTable');
            const wb = XLSX.utils.table_to_book(table);
            XLSX.writeFile(wb, 'ScoreData.xlsx');
        }

        function clearData() {
            if(confirm("ยืนยันการลบข้อมูลทั้งหมด?")) {
                localStorage.removeItem('studentHistory');
                loadData();
            }
        }
        loadData();
    </script>
</body>
</html>

```

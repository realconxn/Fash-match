<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คณิตคิดเร็ว</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-image: url('IMG_0054.png'); 
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed; 
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div class="fixed top-4 right-4">
        <button onclick="showAdminLogin()" class="bg-pink-100/80 backdrop-blur text-pink-700 px-5 py-2 rounded-full font-bold shadow-lg hover:bg-pink-200 transition-all border border-pink-200">
            สำหรับครู/ผู้ปกครอง
        </button>
    </div>

    <div class="w-full max-w-md bg-white/60 backdrop-blur-xl p-8 rounded-3xl shadow-2xl border border-white/70 text-center">
        
        <!-- หน้า Login นักเรียน -->
        <div id="student-login-screen">
            <h1 class="text-3xl font-extrabold text-teal-700 mb-6">คณิตคิดเร็ว</h1>
            <input type="text" id="name" placeholder="ชื่อ-นามสกุล" class="w-full p-4 mb-3 rounded-xl border border-teal-200 outline-none">
            <input type="text" id="class" placeholder="ชั้น" class="w-full p-4 mb-3 rounded-xl border border-teal-200 outline-none">
            <input type="number" id="number" placeholder="เลขที่" class="w-full p-4 mb-4 rounded-xl border border-teal-200 outline-none">
            <button onclick="startGame()" class="w-full bg-teal-500 text-white font-bold py-4 rounded-xl hover:bg-teal-600 transition-all shadow-lg">เริ่มทำแบบทดสอบ</button>
        </div>

        <!-- หน้า Login ครู -->
        <div id="admin-login-screen" class="hidden">
            <h1 class="text-2xl font-bold text-pink-700 mb-6">เข้าสู่ระบบผู้ดูแล</h1>
            <input type="password" id="adminPass" placeholder="รหัสผ่าน 4 ตัว" class="w-full p-4 mb-4 rounded-xl border border-pink-200 outline-none text-center tracking-widest">
            <button onclick="verifyAdmin()" class="w-full bg-pink-500 text-white font-bold py-4 rounded-xl hover:bg-pink-600 mb-3">ยืนยันรหัสผ่าน</button>
            <button onclick="forgotPassword()" class="w-full bg-pink-100 text-pink-600 font-bold py-3 rounded-xl hover:bg-pink-200 mb-3">ลืมรหัสผ่าน?</button>
            <button onclick="hideAdminLogin()" class="w-full bg-gray-200 text-gray-700 font-bold py-3 rounded-xl hover:bg-gray-300">ย้อนกลับ</button>
        </div>

        <!-- หน้า Quiz -->
        <div id="quiz-screen" class="hidden">
            <div id="question" class="text-5xl font-black text-teal-900 mb-6">? + ?</div>
            <div id="choices" class="grid grid-cols-2 gap-4"></div>
        </div>
    </div>

    <script>
        function showAdminLogin() {
            document.getElementById('student-login-screen').classList.add('hidden');
            document.getElementById('admin-login-screen').classList.remove('hidden');
        }

        function hideAdminLogin() {
            document.getElementById('admin-login-screen').classList.add('hidden');
            document.getElementById('student-login-screen').classList.remove('hidden');
        }

        function verifyAdmin() {
            if (document.getElementById('adminPass').value === "0816") {
                window.location.href = "admin.html";
            } else {
                alert("รหัสผ่านไม่ถูกต้อง");
            }
        }

        function forgotPassword() {
            const secret = prompt("กรุณากรอกรหัสลับเพื่อยืนยัน:");
            if (secret === "0816") {
                alert("รหัสผ่านผู้ดูแลคือ: 0816");
            } else {
                alert("รหัสลับไม่ถูกต้อง");
            }
        }

        function startGame() {
            if(!document.getElementById('name').value) return alert("กรุณากรอกข้อมูลให้ครบ");
            document.getElementById('student-login-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
        }
    </script>
</body>
</html>

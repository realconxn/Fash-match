```html
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คณิตคิดเร็ว - ห้องเรียนจิ๋ว</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap');
        body { 
            background-image: url('IMG_0054.png'); 
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed;
            font-family: 'Sarabun', sans-serif;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <!-- ปุ่มเมนูคุณครู -->
    <div class="fixed top-4 right-4 z-40">
        <button onclick="openModal('admin-modal')" class="bg-pink-500 hover:bg-pink-600 text-white px-6 py-2.5 rounded-full text-sm font-bold shadow-lg transition-all duration-300 border-2 border-white/50 backdrop-blur-md">
            สำหรับครู / ผู้ปกครอง
        </button>
    </div>

    <!-- ส่วนหัวข้อหลัก -->
    <div class="w-full max-w-lg bg-white/40 backdrop-blur-xl p-6 rounded-3xl shadow-xl border border-white/60 text-center mt-12 mb-6">
        <h1 class="text-4xl font-extrabold text-sky-700 drop-shadow-sm">คณิตคิดเร็ว</h1>
    </div>

    <!-- ส่วนเนื้อหาหลัก -->
    <div id="app" class="w-full max-w-lg bg-white/30 backdrop-blur-2xl p-8 rounded-3xl shadow-2xl border border-white/50 text-center flex-grow">
        <div id="login-screen" class="space-y-4">
            <input type="text" id="name" placeholder="ชื่อ-นามสกุล" class="w-full p-4 rounded-2xl bg-white/70 border-2 border-white focus:border-sky-400 outline-none shadow-sm transition">
            <input type="text" id="class" placeholder="ชั้น" class="w-full p-4 rounded-2xl bg-white/70 border-2 border-white focus:border-sky-400 outline-none shadow-sm transition">
            <input type="number" id="number" placeholder="เลขที่" class="w-full p-4 rounded-2xl bg-white/70 border-2 border-white focus:border-sky-400 outline-none shadow-sm transition">
            
            <!-- ปุ่มเริ่มทำแบบทดสอบ (ใช้ onclick เพื่อบันทึกข้อมูลก่อนไปหน้าถัดไป) -->
            <button onclick="startQuiz()" class="block w-full bg-sky-500 hover:bg-sky-600 text-white font-bold text-xl py-4 rounded-2xl shadow-lg transition-all transform hover:scale-[1.02]">
                เริ่มทำแบบทดสอบ
            </button>
        </div>
    </div>

    <footer class="mt-8 text-white font-bold text-sm drop-shadow-md">© 2026 - ห้องเรียนจิ๋ว by นันท์</footer>

    <!-- Modals -->
    <div id="admin-modal" class="fixed inset-0 bg-black/40 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white/90 backdrop-blur-lg p-8 rounded-3xl w-full max-w-sm text-center shadow-2xl border border-white">
            <h2 class="text-2xl font-bold mb-6 text-sky-700">เข้าสู่ระบบคุณครู</h2>
            <div class="relative mb-4">
                <input type="password" id="admin-pass" placeholder="รหัสผ่าน" class="w-full p-4 pr-12 rounded-xl border-2 border-gray-200 bg-white/50">
                <button type="button" onclick="togglePass('admin-pass')" class="absolute right-3 top-3 text-gray-400 hover:text-gray-600 transition">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                </button>
            </div>
            <button onclick="checkAdmin()" class="w-full bg-sky-600 hover:bg-sky-700 text-white py-3 rounded-xl font-bold mb-3 transition">ตกลง</button>
            <button onclick="closeModals(); openModal('forgot-modal')" class="text-sm text-pink-600 underline">ลืมรหัสผ่าน</button>
        </div>
    </div>

    <div id="forgot-modal" class="fixed inset-0 bg-black/40 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white/90 backdrop-blur-lg p-8 rounded-3xl w-full max-w-sm text-center shadow-2xl border border-white">
            <h2 class="text-2xl font-bold mb-6 text-pink-600">กู้คืนรหัสผ่าน</h2>
            <div class="relative mb-4">
                <input type="password" id="forgot-key" placeholder="รหัสยืนยัน (0816)" class="w-full p-4 pr-12 rounded-xl border-2 border-gray-200 bg-white/50">
                <button type="button" onclick="togglePass('forgot-key')" class="absolute right-3 top-3 text-gray-400 hover:text-gray-600 transition">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                </button>
            </div>
            <button onclick="verifyForgot()" class="w-full bg-pink-600 hover:bg-pink-700 text-white py-3 rounded-xl font-bold transition">ยืนยัน</button>
        </div>
    </div>

    <script>
        // ฟังก์ชันเริ่มทำแบบทดสอบ
        function startQuiz() {
            const userData = {
                name: document.getElementById('name').value || "ไม่ระบุชื่อ",
                cls: document.getElementById('class').value || "-",
                num: document.getElementById('number').value || "-"
            };
            localStorage.setItem('currentUser', JSON.stringify(userData));
            window.location.href = 'quiz.html';
        }

        if (!localStorage.getItem('adminPass')) localStorage.setItem('adminPass', '0816');
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModals() { document.getElementById('admin-modal').classList.add('hidden'); document.getElementById('forgot-modal').classList.add('hidden'); }
        function togglePass(id) { const input = document.getElementById(id); input.type = input.type === 'password' ? 'text' : 'password'; }

        function checkAdmin() {
            if (document.getElementById('admin-pass').value === localStorage.getItem('adminPass')) window.location.href = 'admin.html';
            else alert("รหัสผ่านไม่ถูกต้อง!");
        }

        function verifyForgot() {
            if (document.getElementById('forgot-key').value === '0816') {
                alert("รหัสผ่านปัจจุบันของคุณคือ: " + localStorage.getItem('adminPass'));
                closeModals();
            } else { alert("รหัสยืนยันไม่ถูกต้อง!"); }
        }
    </script>
</body>
</html>

```
